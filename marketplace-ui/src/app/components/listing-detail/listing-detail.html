<div class="container mt-5" *ngIf="listing">
  <div class="row justify-content-center">
    <div class="col-md-7">
      <h2 class="fw-bold mb-4 text-center">Listing Posted!</h2>
      <div class="card border-dark shadow">
        <div class="card-header bg-dark text-white">
          <h5 class="mb-0">{{ listing.title }}</h5>
        </div>
        <div class="card-body">
          <p><strong>Price:</strong> \${{ listing.price }}</p>
          <p><strong>Description:</strong> {{ listing.description }}</p>
          <p><strong>Condition:</strong> {{ listing.condition }}</p>
          <p><strong>Location:</strong> {{ listing.location }}</p>
          <p><strong>Categories:</strong></p>
          <ul>
            <li *ngFor="let cat of listing.categories">{{ cat }}</li>
          </ul>
        </div>
        <div class="card-footer d-flex justify-content-between">
          <a routerLink="/listings" class="btn btn-outline-primary">Browse All Listings</a>
          <a routerLink="/add" class="btn btn-primary">Post Another</a>
        </div>
      </div>
    </div>
  </div>
</div>
