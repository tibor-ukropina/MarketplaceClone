<div class="container mt-5">
  <div class="text-center mb-5">
    <h1 class="fw-bold">Welcome to Marketplace</h1>
    <p class="text-muted fs-5">Buy and sell items in your local community</p>
  </div>
  <div class="row g-4 justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-sm h-100">
        <div class="card-body text-center p-5">
          <div class="mb-3 fs-1">🛍️</div>
          <h5 class="card-title fw-bold">Browse Listings</h5>
          <p class="card-text text-muted">Explore items for sale near you</p>
          <a routerLink="/listings" class="btn btn-primary px-4">Browse</a>
        </div>
      </div>
    </div>
    <div class="col-md-5">
      <div class="card shadow-sm h-100">
        <div class="card-body text-center p-5">
          <div class="mb-3 fs-1">📦</div>
          <h5 class="card-title fw-bold">Post a Listing</h5>
          <p class="card-text text-muted">Sell something you no longer need</p>
          <a routerLink="/add" class="btn btn-primary px-4">Post</a>
        </div>
      </div>
    </div>
  </div>
</div>
