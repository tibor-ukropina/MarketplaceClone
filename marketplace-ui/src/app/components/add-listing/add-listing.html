<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <h2 class="fw-bold mb-4">Post a Listing</h2>
      <form (ngSubmit)="onSubmit()">

        <div class="mb-3">
          <label for="title" class="form-label">Title</label>
          <input type="text" id="title" class="form-control" [(ngModel)]="listing.title" name="title" required placeholder="e.g. iPhone 13, Blue Couch, Mountain Bike" />
        </div>

        <div class="mb-3">
          <label for="description" class="form-label">Description</label>
          <textarea id="description" class="form-control" [(ngModel)]="listing.description" name="description" rows="4" required placeholder="Describe your item"></textarea>
        </div>

        <div class="mb-3">
          <label for="price" class="form-label">Price ($)</label>
          <input type="number" id="price" class="form-control" [(ngModel)]="listing.price" name="price" required min="0" placeholder="0" />
        </div>

        <div class="mb-3">
          <label for="condition" class="form-label">Condition</label>
          <select id="condition" class="form-select" [(ngModel)]="listing.condition" name="condition" required>
            <option value="" disabled>Select condition</option>
            <option>New</option>
            <option>Like New</option>
            <option>Good</option>
            <option>Fair</option>
            <option>Poor</option>
          </select>
        </div>

        <div class="mb-3">
          <label for="location" class="form-label">Location</label>
          <input type="text" id="location" class="form-control" [(ngModel)]="listing.location" name="location" required placeholder="e.g. Chicago, IL" />
        </div>

        <div class="mb-4">
          <label class="form-label">Categories</label>
          <select multiple class="form-select" [(ngModel)]="listing.categories" name="categories">
            <option>Electronics</option>
            <option>Clothing &amp; Accessories</option>
            <option>Furniture</option>
            <option>Vehicles</option>
            <option>Home &amp; Garden</option>
            <option>Toys &amp; Games</option>
            <option>Sports &amp; Outdoors</option>
            <option>Books &amp; Media</option>
            <option>Musical Instruments</option>
            <option>Tools &amp; Hardware</option>
            <option>Pet Supplies</option>
            <option>Free Items</option>
            <option>Other</option>
          </select>
          <div class="form-text">Hold Ctrl / Cmd to select multiple categories</div>
        </div>

        <button type="submit" class="btn btn-primary px-5">Post Listing</button>
      </form>
    </div>
  </div>
</div>
